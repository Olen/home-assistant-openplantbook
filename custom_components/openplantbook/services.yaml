search:
  name: Search
  description: Searches Openplantbook for a plant
  fields:
    alias:
      name: Search for
      description: The string to search for
      example: Capsicum
      required: true
      selector:
        text:

get:
  name: Get
  description: Fetches data for a single species
  fields:
    species:
      name: Species
      description: The name of the species exactly as written in "pid" or "scientific species" in Openplantbook
      example: coleus 'marble'
      required: true
      selector:
        text:
    cache:
      name: Use cache
      description: Set to false to bypass the cache and fetch fresh data from the API
      default: true
      required: false
      selector:
        boolean:

upload:
  name: Upload
  description: Upload sensors data of all plant instances
#  fields:
#    plant_instance:
#      name: Plant Instance
#      description: Plant instance name as in Plant Monitor
#      example: Acer on balcony
#      required: true
#      selector:
#        text:

clean_cache:
  name: Clean Cache
  description: Clean up the cached entries from Openplantbook
  fields:
    hours:
      name: Hours
      description: Minimum age of entries to clean from the cache. Defaults to 24 hours if not set
      example: 6
      required: false
      selector:
        number:
          mode: box
          unit_of_measurement: hours
          min: 0
          max: 24
